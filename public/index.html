    <!-- Structured Data: FAQPage (rich snippet opportunity) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I apply for a micro-grant from Good Neighbor Fund?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit goodneighbor.fund/pitch to submit a short video pitch. No pitch decks, business plans, or equity are required. If selected, you receive $1,000 in belief capital to support your early-stage venture."
          }
        },
        {
          "@type": "Question",
          "name": "Who is eligible for Good Neighbor Fund micro-grants?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Good Neighbor Fund has chapters in Western New York (Buffalo, Rochester, Niagara Falls and the surrounding region), Denver, Upstate New York (Syracuse, Ithaca, Binghamton), and the Capital Region of New York (Albany, Schenectady, Troy). All industries and backgrounds welcome — no age, revenue, or registration requirements."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to give up equity for a Good Neighbor Fund grant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Good Neighbor Fund micro-grants are belief capital — you keep 100% of your business. There is no equity, repayment, or strings attached."
          }
        },
        {
          "@type": "Question",
          "name": "How much money does Good Neighbor Fund give out?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each grant is $1,000. Since 2023, Good Neighbor Fund has awarded 34+ micro-grants totaling over $34,000 across its chapters. 80% of recipients are women-owned businesses and 52% are BIPOC-owned."
          }
        },
        {
          "@type": "Question",
          "name": "Where does Good Neighbor Fund get its money?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Good Neighbor Fund is a collective-giving nonprofit. Funding comes from Limited Partners (LPs) — local founders, operators, and community members who pool their own capital each quarter to fund grants in their city. There are no institutional backers, no overhead, and no bureaucracy."
          }
        },
        {
          "@type": "Question",
          "name": "How often are Good Neighbor Fund grants awarded?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each chapter reviews and awards grants quarterly. Pitches can be submitted any time at goodneighbor.fund/pitch and roll into the next review cycle for the relevant chapter."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need a business plan, pitch deck, or registered LLC to apply?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The only thing required is a 60-second video pitch. We back founders before they're 'ready' — that's the entire point of belief capital. If selected, we'll help you set up what you need to receive the funds."
          }
        },
        {
          "@type": "Question",
          "name": "What can I use the $1,000 micro-grant for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anything your business needs. Past recipients have used the funds for inventory, equipment, software, marketing, business licensing, ingredients, and prototyping. There are no restrictions on how the money is spent."
          }
        }
      ]
    }
